services:
  chroma-db:
    image: chromadb/chroma:latest
    environment:
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  api-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["bash", "-lc", "uvicorn omnimission.api.main:app --host 0.0.0.0 --port 8080"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      OMNIMISSION_CHROMA_HOST: chroma-db
      OMNIMISSION_CHROMA_PORT: "8000"
      OMNIMISSION_EMBED_MODEL: sentence-transformers/all-MiniLM-L6-v2
      # Optional: x402 pay-per-use on /mcp (set PAY_TO when ASK_ENABLED=true)
      # OMNIMISSION_X402_ASK_ENABLED: "true"
      # OMNIMISSION_X402_PAY_TO: "0xYourReceiverAddress"
      # OMNIMISSION_X402_NETWORK: "eip155:84532"
      # OMNIMISSION_X402_PRICE: "$0.01"
      # OMNIMISSION_X402_FACILITATOR_URL: "https://x402.org/facilitator"
    ports:
      - "8080:8080"
    depends_on:
      - chroma-db

  crawler-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["bash", "-lc", "python -m omnimission.crawler.worker"]
    environment:
      OMNIMISSION_CHROMA_HOST: chroma-db
      OMNIMISSION_CHROMA_PORT: "8000"
      OMNIMISSION_EMBED_MODEL: sentence-transformers/all-MiniLM-L6-v2
      OMNIMISSION_CRAWLER_INTERVAL_MINUTES: "15"
      OMNIMISSION_CRAWLER_SEED_URLS: "https://raw.githubusercontent.com/anthropics/skills/main/README.md"
    depends_on:
      - chroma-db

volumes:
  chroma_data:
